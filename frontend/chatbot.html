<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - ANALYDWO Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
        }

        .chat-header {
            padding: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-body {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 75%;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        .bot-msg {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }

        .user-msg {
            background: linear-gradient(135deg, var(--secondary), #1d4ed8);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }

        .chat-footer {
            padding: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 1rem;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            border-color: var(--secondary);
            background: rgba(0,0,0,0.4);
        }

        .send-btn {
            background: var(--primary);
            color: #052e16;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 1.2rem;
        }

        .send-btn:hover {
            transform: scale(1.1);
            background: var(--primary-hover);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Loading dots */
        .typing-indicator {
            display: none;
            padding: 1rem;
            background: rgba(59, 130, 246, 0.15);
            border-radius: 20px;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            margin-right: 4px;
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="chat-container">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <a href="dashboard.html" style="text-decoration: none; font-size: 1.5rem;" title="Back Default">⬅️</a>
                    <h3 style="margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 1.5rem;">🤖</span> ANALYDWO Assistant
                    </h3>
                </div>
                <div style="font-size: 0.8rem; color: var(--primary);">🟢 Online</div>
            </div>
            
            <div class="chat-body" id="chatArea">
                <div class="message bot-msg">
                    Hello! I am your AI Dataset Assistant. I've analyzed your uploaded dataset. You can ask me questions about rows, columns, averages, maximums, and minimums of the numeric variables.
                </div>
                <div class="typing-indicator" id="typingIndicator">
                    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                </div>
            </div>
            
            <div class="chat-footer">
                <input type="text" class="chat-input" id="userInput" placeholder="Ask a question about your data..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}-msg`;
            div.innerText = text;
            chatArea.insertBefore(div, typingIndicator);
            scrollToBottom();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // User msg
            appendMessage(text, 'user');
            userInput.value = '';
            
            // Show typing
            typingIndicator.style.display = 'block';
            scrollToBottom();
            
            try {
                const response = await askChatbot(text);
                typingIndicator.style.display = 'none';
                appendMessage(response.answer, 'bot');
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Sorry, I encountered an error communicating with the main engine.", 'bot');
            }
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
